name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version from File
        id: get_version
        run: |
          # Liest die Version aus der wp-barcode-api.php (sucht nach "Version: x.x")
          VERSION=$(grep -i "Version:" wp-barcode-api.php | awk -F': ' '{print $2}' | tr -d '[:space:]')
          echo "Gefundene Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if Tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if Tag exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "Tag ${{ env.VERSION }} existiert bereits. Der Release-Prozess wird übersprungen."
          exit 0

      - name: Commit readme.txt update
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # 1. "Stable tag" in readme.txt aktualisieren
          sed -i "s/^Stable tag: .*/Stable tag: ${{ env.VERSION }}/" readme.txt

          # 2. Platzhalter für den neuen Changelog-Eintrag hinzufügen
          sed -i "/^== Changelog ==/a \\\n= ${{ env.VERSION }} =\n* Siehe die vollständigen Release-Notes auf GitHub.\n" readme.txt

          # 3. Änderungen committen, damit der Tag auf den neuesten Stand verweist
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add readme.txt
          # Nur committen, wenn es Änderungen gibt
          if ! git diff --staged --quiet; then
            git commit -m "Docs: Update readme.txt for version ${{ env.VERSION }}"
            git push
          fi

      - name: Prepare Release Package
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # Erstelle temporären Ordner für die korrekte Struktur (wp-barcode-api/...)
          mkdir build
          mkdir build/wp-barcode-api
          
          # Kopiere alle Dateien außer git/github/build Stuff in den Unterordner
          rsync -av --progress . build/wp-barcode-api --exclude .git --exclude .github --exclude .vscode --exclude .gitignore --exclude build --exclude /vendor --exclude 'plugin-update-checker/examples' --exclude 'plugin-update-checker/README.md' --exclude 'plugin-update-checker/composer.json'
          
          # Wechsel in build Ordner und zippe den vcards Ordner
          cd build
          zip -r ../wp-barcode-api.zip wp-barcode-api

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ env.VERSION }} wp-barcode-api.zip --title "Version ${{ env.VERSION }}" --generate-notes